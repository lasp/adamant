---
description: This component provides commands intended for testing propagation of C++ faults through a user-implemented C++ Termination Handler (TH) to the Ada Last Chance Handler (LCH). The `Raise_Exception_in_Cpp` command explicitly raises a C++ exception. When a TH is configured to forward termination events to the Ada LCH, this command allows verification that the exception propagation pathway is functioning correctly. The `Int_Divide_By_Zero_In_Cpp` command demos a potential approach to the special case of integer division-by-zero handling. In C++, division by zero is undefined behavior, and the resulting handling is typically determined either by a customized C++ runtime or by target-specific behavior. Many systems return a defined value (often NaN) rather than raising an exception. To ensure such conditions propagate to the Ada LCH, the result of the division can be returned to Ada and assigned to a constrained type whose range excludes the expected return value. This constraint violation raises an Ada exception which, if left unhandled, triggers the Last Chance Handler. The `FP_Divide_By_Zero_In_Cpp` command performs a floating-point division by zero in C++, which per IEEE 754 produces +infinity or -infinity. The result is assigned to an Ada constrained float subtype that excludes infinities, triggering a Constraint_Error that propagates to the Last Chance Handler.
execution: passive
preamble: |
  subtype Magic_Number_Type is Interfaces.Unsigned_32 range 2 .. Interfaces.Unsigned_32'Last;
init:
  description: The magic number is provided at instantiation.
  parameters:
    - name: Magic_Number
      type: Magic_Number_Type
      description: As commands to this component crash the system, provide this number as the key value of the safety interlock mechanism that guards against unintentional execution of commands in this component.
    - name: Sleep_Before_Execute_Ms
      type: Natural
      description: The number of milliseconds to sleep after receiving a command before executing its implementation. This allows time for any events to be written by the component, if desired.
      default: "1_000"
connectors:
  - description: The command receive connector
    type: Command.T
    kind: recv_sync
  - description: This connector is used to register and respond to the component's commands.
    type: Command_Response.T
    kind: send
  - description: The system time is retrieved via this connector.
    return_type: Sys_Time.T
    kind: get
  - description: Events are sent out of this connector.
    type: Event.T
    kind: send
