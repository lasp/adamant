---
description: Packet Header for Register Stuffer Packets
preamble: | # Set the range to be (packetsize - header_size) / 4
  subtype N_Registers is Integer range 0 .. {{ ((packet_buffer_size - 12) / 8) | int }}; 
fields:
  - name: Start_Address
    description: Starting address of the N register dump
    type: System.Address
    format: U64
    skip_validation: True
    byte_image: True
  - name: Num_Registers
    description: Number of Registers to Dump
    type: N_Registers
    format: U32