---
description: A reference to multiple registers packed record.
preamble: | 
  subtype Num_Registers is Integer range 0 .. {{ ((packet_buffer_size - 12) / 8) | int }}; 
fields:
  - name: Address
    description: The address of the base register.
    type: System.Address
    format: U64
    skip_validation: True
    byte_image: True
  - name: Value
    description: The number of registers to be dumped
    type: Num_Registers
    format: U32