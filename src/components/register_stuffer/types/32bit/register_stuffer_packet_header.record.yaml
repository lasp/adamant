---
description: Packet Header for Register Stuffer Packets
preamble: | #Validate 20 being the right size?
  subtype N_Registers is Integer range 0 .. {{ ((packet_buffer_size - 8) / 4) | int }}; 
fields:
  - name: Start_Address
    description: Starting address of the N register dump
    type: System.Address # This needs to be packed U32
    format: U32
    skip_validation: True
    byte_image: True
  - name: Num_Registers
    description: Number of Registers to Dump
    type: N_Registers
    format: U32
