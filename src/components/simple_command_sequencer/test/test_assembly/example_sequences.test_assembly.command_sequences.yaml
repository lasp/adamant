# Command Sequences Definition
# This file defines composite commands that execute sequences of sub-commands

name: Flight_Sequences
description: Common flight software command sequences

command_timeout_seconds: 10  # default wait for sub-command responses

# Extra packages needed by step arg expressions below.
with:
  - Sequence_Enums

sequences:
  # Simple sequence with no arguments
  - name: Sequence_A
    description: Execute commands on component A
    wait_for_command_completion: true
    continue_on_failure: true

    sequence:
      - command: Component_A.Command_1
      - command: Component_A.Command_2
        arg: (Seconds => 3, Subseconds => 14)
      - sleep: (Value => 3000)
      - command: Component_A.Command_3
        arg: (Value => 3)

  - name: Sequence_B
    description: Perform generic arguments with component A and B
    wait_for_command_completion: true
    continue_on_failure: false
    arg_type: Sequence_B_Arg.T

    sequence:
      - command: Component_A.Command_3
        arg: Arg.Component_A_Arg
      - command: Component_B.Command_3
        arg: Arg.Component_B_Arg

  - name: Sequence_C
    description: No-wait sequence for direct-dispatch testing
    wait_for_command_completion: false
    continue_on_failure: false

    sequence:
      - command: Component_A.Command_1
      - command: Component_A.Command_1

  - name: Sequence_D
    description: Sequence with a large sleep value to test an overflow sleep
    wait_for_command_completion: true
    continue_on_failure: false

    sequence:
      - sleep: (Value => 4_294_967_295)

  # A sequence that calls another sequence. Each sequence is a first-class
  # command on the sequencer, so a sub-sequence step is just a command step
  # targeting the sequencer's own synthesized command.
  - name: Sequence_E
    description: Call Sequence_C as a sub-sequence, then run a regular command
    wait_for_command_completion: true
    continue_on_failure: false

    sequence:
      - command: Sequencer.Sequence_C
        arg: (Response_Behavior => Sequence_Enums.Sequence_Response_Behavior.Send_After_Sequence_Start)
      - command: Component_A.Command_1
