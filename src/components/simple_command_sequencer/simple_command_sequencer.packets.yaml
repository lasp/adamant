---
description: Packets for the Simple Command Sequencer component.
packets:
  - name: Summary_Packet
    description: Periodic summary of all sequence frames. Contains one Sequence_Frame_Summary record per frame (Num_Concurrent_Sequences total, in frame order), reporting which sequence is running on each frame, its current step, its execution state, and whether an operator is still waiting on a deferred command response. Emitted every Summary_Packet_Period ticks; a period of zero (the default) disables emission. The period is set with the Set_Summary_Packet_Period command.
