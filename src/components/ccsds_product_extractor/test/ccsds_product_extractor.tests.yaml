---
description: This is a unit test suite for the Ccsds Product Extractor component
tests:
  - name: Test_Received_Data_Product_Packet
    description: This unit test is used to test the logic of receiving a packet that contains a data product that needs to be extracted
  - name: Test_Set_Up_Default_Seeding
    description: This unit test verifies that products which declare a "default_at_set_up" in the model are seeded into the data product database during Set_Up with their default value and a fresh timestamp.