---
description: Information about a failed parameter table operation (update or load).
fields:
  - name: Table_Id
    type: Parameter_Types.Parameter_Table_Id
    format: U16
    description: The parameter table ID that the operation was attempted for.
  - name: Connector_Index
    type: Connector_Types.Connector_Index_Type
    format: U16
    description: The connector index of the destination that failed.
  - name: Release
    type: Parameters_Memory_Region_Release.T
    description: The release response from the downstream component containing the memory region and status.
