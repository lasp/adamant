---
description: This is the packet send unit test suite for the Serial Interface Component
tests:
  - name: Test_Packet_Receive
    description: This unit test makes sure that packets received through the serial port are forwarded through the send connector, and that a received header containing the maximum possible packet length of 16#FFFF# is rejected with a Packet_Recv_Failed event instead of crashing the listener task. This test exercises the additional internal task of the Serial Interface Component.
