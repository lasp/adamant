description: This is the register map for an example system. Both registers and register sets (a packed record holding more than one register) can be defined and assigned addresses here.
items:
  - address: 0x4000_0004
    name: First_Register
    description: An important register.
    type: Packed_U32.Register_T
  - address: 0x4000_0010
    name: Second_Register
    description: BAD REGISTER TYPE! This register demonstrates how the system will refuse to generate a register map if any register is not full bit width (i.e. not always valid). In this case, a Natural does not use all 32 bits to represent itself, it only uses 31.
    type: Packed_Natural.Register_T
