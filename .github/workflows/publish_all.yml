name: Build All Documentation
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  compile_job:
    name: publish_all (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lasp/adamant:multi
      options: --user root --platform ${{ matrix.platform }}
    steps:
      - run: echo "Starting job triggered by a ${{ github.event_name }} event on a ${{ runner.os }} server hosted by GitHub."
      - run: echo "Checking out ${{ github.repository }} on branch ${{ github.ref }}."
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Build all documentation
        run: bash env/github_run.sh "redo publish"
      - run: echo "Finished with status - ${{ job.status }}."
        if: always()
